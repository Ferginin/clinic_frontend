    </div>

    <!-- Center: Navigation -->
    <div class="footer-section">
      <h4>Навигация</h4>
      <nav class="footer-nav">
        <a routerLink="/services" class="footer-link">Услуги</a>

        <a href="tel:+79991234567" class="footer-link">{{ clinicPhone1 }}</a>

      <p class="contact-item">
